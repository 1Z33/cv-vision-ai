services:
  - type: web
    name: cv-vision-ai-backend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cv_vision_db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: cv_vision_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: GEMINI_API_KEY
        value: "AIzaSyA2P9bM7gbyC4iQe1R8yemoDh8rag2CTM0"

databases:
  - name: cv_vision_db
    plan: free
    region: eu
