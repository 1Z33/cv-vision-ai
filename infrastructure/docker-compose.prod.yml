version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${cv_vision_db_user}
      POSTGRES_PASSWORD: ${al1234}
      POSTGRES_DB: cv_vision_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cv-vision-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SYNC_DATABASE_URL=${SYNC_DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=AIzaSyByOhZAX2GMrEge8jhuPfr6k5KKfKOajjs
      - ENVIRONMENT=production
      - DEBUG=False
    volumes:
      - uploads:/app/uploads
    networks:
      - cv-vision-network
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    networks:
      - cv-vision-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/app/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - cv-vision-network

volumes:
  postgres_data:
  uploads:

networks:
  cv-vision-network:
    driver: bridge